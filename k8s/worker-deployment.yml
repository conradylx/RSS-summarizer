apiVersion: apps/v1
kind: Deployment
metadata:
  name: rss-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rss-worker
  template:
    metadata:
      labels:
        app: rss-worker
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: worker
          image: ghcr.io/conradylx/rss-summarizer-backend:latest
          imagePullPolicy: Always
          command: ["celery", "-A", "app.worker.celery_app", "worker", "--loglevel=info", "--concurrency=1"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: DATABASE_URL
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: REDIS_URL
            - name: OLLAMA_URL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: OLLAMA_URL
          resources:
            limits:
              cpu: "500m"
              memory: "512Mi"
            requests:
              cpu: "250m"
              memory: "256Mi"