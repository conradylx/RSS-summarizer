apiVersion: apps/v1
kind: Deployment
metadata:
  name: rss-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rss-frontend
  template:
    metadata:
      labels:
        app: rss-frontend
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: frontend
          image: ghcr.io/conradylx/rss-summarizer-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          resources:
            limits:
              cpu: "500m"
              memory: "512Mi"
            requests:
              cpu: "250m"
              memory: "256Mi"