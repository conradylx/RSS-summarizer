services:
  api:
    image: ghcr.io/conradylx/rss-summarizer-backend:latest
    container_name: api
    ports:
      - "8000:8000"
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    networks:
      - app_network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthcheck')"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    image: ghcr.io/conradylx/rss-summarizer-frontend:latest
    container_name: frontend
    ports:
      - "5173:5173"
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  postgres:
    image: postgres:17
    container_name: postgres
    env_file:
      - .env
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pgadmin -d rsssummerizer"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    networks:
      - app_network

  redis:
    image: redis:7
    container_name: redis
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: ["redis-server", "--maxmemory", "128mb", "--maxmemory-policy", "allkeys-lru"]
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    networks:
      - app_network

  worker:
    image: ghcr.io/conradylx/rss-summarizer-backend:latest
    container_name: worker
    command: celery -A app.worker.celery_app worker --loglevel=warning --concurrency=2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy
    env_file:
      - .env
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    networks:
      - app_network

  beat:
    image: ghcr.io/conradylx/rss-summarizer-backend:latest
    container_name: beat
    command: celery -A app.worker.celery_app beat --loglevel=warning
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      worker:
        condition: service_started
    env_file:
      - .env
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    networks:
      - app_network

  ollama:
    image: ollama/ollama:0.9.0
    container_name: ollama
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    entrypoint:
      - sh
      - -c
      - |
        ollama serve &
        sleep 5 &&
        ollama pull llama3.2:1b &&
        wait
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
    networks:
      - app_network

volumes:
  postgres_data:
  redis_data:
  ollama_data:

networks:
  app_network:
    driver: bridge