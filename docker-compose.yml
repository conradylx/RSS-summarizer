services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: api
    ports:
      - 8000:8000
    security_opt:
      - no-new-privileges:true
    volumes:
      - ./backend:/app
    restart: always
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    networks:
      - app_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    ports:
      - 5173:5173
    security_opt:
      - no-new-privileges:true
    volumes:
      - ./frontend:/app
      - /app/node_modules
    restart: always
    command: npm run dev -- --host

  postgres: 
    image: postgres:latest
    container_name: postgres
    env_file:
      - .env
    ports:
      - 5432:5432
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pgadmin -d rsssummerizer"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - app_network

  redis:
    image: redis:latest
    container_name: redis
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      interval: 1s
      timeout: 3s
      retries: 5
    command: ["redis-server"]
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    networks:
      - app_network
  
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: worker
    command: celery -A app.worker.celery_app worker --loglevel=info --concurrency=1
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy
    env_file:
      - .env
    networks:
      - app_network
    
  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: beat
    command: celery -A app.worker.celery_app beat --loglevel=info
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      worker:
        condition: service_started
    env_file:
      - .env
    networks:
      - app_network

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - 11434:11434
    volumes:
      - ollama_data:/root/.ollama
    entrypoint:
      - sh
      - -c
      - |
        ollama serve &
        sleep 5 &&
        ollama pull llama3.2:1b &&
        wait
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - app_network

volumes:
  postgres_data:
  redis_data:
  ollama_data:

networks:
  app_network:
    driver: bridge